<title>Store #364 · Knowledge Base</title>
<style>
:root{--teal:#0b7f7c;--teal-dark:#075e5c;--teal-light:#e6f4f3;--ink:#1c2b2b;--muted:#5b6b6b;--line:#dce6e5;}
*{box-sizing:border-box;}
body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,var(--teal),var(--teal-dark));
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);padding:20px;}
.card{background:#fff;border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,.25);padding:34px 30px;width:100%;max-width:380px;text-align:center;}
.lock{width:56px;height:56px;border-radius:14px;background:var(--teal-light);color:var(--teal-dark);display:grid;place-items:center;margin:0 auto 16px;}
.lock svg{width:28px;height:28px;}
h1{font-size:19px;margin:0 0 4px;}
p.sub{color:var(--muted);font-size:13.5px;margin:0 0 20px;}
input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:15px;font-family:inherit;outline:none;}
input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(11,127,124,.15);}
button{width:100%;margin-top:12px;padding:12px;border:0;border-radius:10px;background:var(--teal);color:#fff;font-size:15px;font-weight:600;cursor:pointer;}
button:hover{background:var(--teal-dark);}
button:disabled{opacity:.6;cursor:default;}
.err{color:#c0392b;font-size:13px;margin-top:12px;min-height:16px;}
.foot{color:var(--muted);font-size:11.5px;margin-top:18px;line-height:1.5;}
</style>
